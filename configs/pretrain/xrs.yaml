defaults:
  - _self_

# Model Configuration
model:
  in_channels: 1  # Number of channels (soft, hard)
  seq_len: 1440
  embed_dim: 1280  # Reduced embed_dim for lightweight model
  encoder_depth: 4
  decoder_depth: 2
  num_heads: 8
  data_type: "1d"  # Options: "1d" or "2d"
  image_size: 512  # Only used if data_type is "2d"
  patch_size: 8   # Only used if data_type is "2d"
  mask_ratio: null

# Optimizer Configuration
optimizer:
  type: adamw  # Options: "adam" or "adamw"
  lr: 1e-4
  weight_decay: 0.01
  eps: 1e-7
  betas: [0.9, 0.999]
  # Scheduler Configuration
  scheduler:
    use: cosine_warmup  # Options: "cosine_warmup" or null for constant LR
    monitor: val/loss
    # Cosine warmup parameters
    cosine_warmup:
      total_steps: 10000  # Total training steps (set to max_epochs * steps_per_epoch approx)
      warmup_ratio: 0.1  # Warmup ratio (10% of total steps)
      min_lr: 1e-8  # Minimum learning rate after decay

# Loss Configuration
loss:
  type: mse  # Options: "mse", "mae", or "rmse"

# DataModule Configuration
data:
  zarr_path: ./data/xrs_24hour_slices_v2.zarr
  train_index_path: ./data/pretrain/train.csv
  val_index_path: ./data/pretrain/val.csv
  test_index_path: ./data/pretrain/test.csv
  channels:  # List of channels to load
    - soft
    # - hard
  batch_size: 4
  num_workers: 1
  data_type: "1d"  # Must match model.data_type
  scalers: ./data/xrs_stat_train.yaml # Normalization statistics

# Trainer Configuration
trainer:
  phase: test
  max_epochs: 100
  accelerator: auto
  devices: 1
  precision: 32
  accumulate_grad_batches: 8
  gradient_clip_val: 1.0

# Logging
logger:
  tensorboard: true
  log_every_n_steps: 4

# Wandb Configuration
wandb:
  name: xrs_pretrain_soft_test10
  id: xrs_pretrain_soft_test10
  resume: allow
  save_dir: ./results
  entity: gsu-dmlab
  project: modality-adapter
  group: xrs
  log_model: false
  notes: "pretraining run"
  offline: false
  save_code: false
  tag: ["pretrain", "mae", "xrs"]

etc:
  resume: false
  ckpt_dir: ./results/checkpoints/pretrain/xrs/
  ckpt_name_tag: xrs_1e-4_soft_large
  ckpt_file: xrs_1e-6_soft_small_epoch=92-val_loss=0.0000.ckpt
  ckpt_weights_only: false
  save_test_results_path: ./results/test/
  enable_version_counter: False
  vis_out_dir: ./results/vis/xrs/
  vis_out_name: visualization_xrs.png

  # visualization
  out_dir: ./results/vis/
  max_batches: 5
  num_viz_samples: 4
